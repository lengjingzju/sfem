<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <rect x="200" y="10" width="600" height="30" rx="6" fill="#1E3A8A"/>
  <text x="500" y="30" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">SFEM四维认知架构总图</text>
  <!-- ========== 意层（顶部中央，统摄位置） ========== -->
  <rect x="350" y="55" width="300" height="80" rx="8" fill="#EFF6FF" stroke="#1E40AF" stroke-width="2.5"/>
  <text x="500" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">意层 · 意识维度（认知微内核）</text>
  <text x="500" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">世界模型 𝒲 · 融合函数 φ · 意义赋予 μ</text>
  <text x="500" y="116" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">意图生成 ι · 元认知 Γ · 理解与反思</text>
  <text x="500" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">符·形·音融合关联后涌现的理解中枢</text>
  <!-- 意层到符层的箭头 -->
  <line x1="425" y1="135" x2="425" y2="170" stroke="#1E40AF" stroke-width="1.5"/>
  <polygon points="421,168 425,176 429,168" fill="#1E40AF"/>
  <text x="412" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1E40AF">意图</text>
  <!-- 意层到形层的箭头 -->
  <line x1="500" y1="135" x2="500" y2="170" stroke="#1E40AF" stroke-width="1.5"/>
  <polygon points="496,168 500,176 504,168" fill="#1E40AF"/>
  <text x="510" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1E40AF">约束</text>
  <!-- 意层到音层的箭头 -->
  <line x1="575" y1="135" x2="575" y2="170" stroke="#1E40AF" stroke-width="1.5"/>
  <polygon points="571,168 575,176 579,168" fill="#1E40AF"/>
  <text x="588" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1E40AF">策略</text>
  <!-- ========== 符层（左） ========== -->
  <rect x="30" y="175" width="290" height="190" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="30" y="175" width="290" height="28" rx="6" fill="#FDE68A"/>
  <text x="175" y="194" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B45309">符层 · 规则维度</text>
  <text x="175" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">必然规则：必然推导 · 可验证</text>
  <text x="175" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">会话约束：指令遵循 · 长程一致</text>
  <text x="175" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">验证函数 V · 结构化推理</text>
  <text x="175" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">先验注入：概念锚点 · 生成模板</text>
  <text x="175" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">约束管理器：维护与强制注入</text>
  <text x="175" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">回答“世界必须如何” · 智能的理性骨架</text>
  <!-- 符层到意层的箭头 -->
  <line x1="320" y1="240" x2="350" y2="100" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="348,103 354,95 346,97" fill="#F59E0B"/>
  <text x="330" y="170" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B45309">事实/规则</text>
  <!-- 符层到形层的箭头（先验注入） -->
  <line x1="175" y1="365" x2="175" y2="395" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="171,393 175,401 179,393" fill="#F59E0B"/>
  <text x="162" y="383" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B45309">注入/约束</text>
  <!-- ========== 形层（中） ========== -->
  <rect x="355" y="175" width="290" height="190" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="355" y="175" width="290" height="28" rx="6" fill="#DBEAFE"/>
  <text x="500" y="194" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">形层 · 现象维度</text>
  <text x="500" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">连续向量 · 统计相似 · 生成</text>
  <text x="500" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">现象感知 · 模式识别 · 工具调用</text>
  <text x="500" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">规则归纳：从现象中自动提炼规则</text>
  <text x="500" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">候选规则生成 · 模式聚类 · 关联挖掘</text>
  <text x="500" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">内容核心输出（不含风格标记）</text>
  <text x="500" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">回答“世界通常如何” · 智能的现象血肉</text>
  <!-- 形层到意层的箭头 -->
  <line x1="500" y1="175" x2="500" y2="137" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="496,139 500,131 504,139" fill="#3B82F6"/>
  <text x="510" y="158" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">现象/模式</text>
  <!-- 形层到符层的箭头（规则归纳反哺） -->
  <line x1="355" y1="330" x2="320" y2="330" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="322,326 314,330 322,334" fill="#3B82F6"/>
  <text x="338" y="345" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">归纳反哺</text>
  <!-- ========== 音层（右） ========== -->
  <rect x="680" y="175" width="290" height="190" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="680" y="175" width="290" height="28" rx="6" fill="#DBEAFE"/>
  <text x="825" y="194" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">音层 · 情感维度</text>
  <text x="825" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">风格参数 · 语用策略 · 渲染</text>
  <text x="825" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">语用解码 · 情感分析 · 人格管理</text>
  <text x="825" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">内容与风格分离 · 表达可控</text>
  <text x="825" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">多模态渲染 · 社会信号感知</text>
  <text x="825" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0F172A">人格一致性维护 · 跨轮次稳定</text>
  <text x="825" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">回答“世界如何被体验” · 智能的体验色彩</text>
  <!-- 音层到意层的箭头 -->
  <line x1="680" y1="240" x2="650" y2="100" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="652,103 646,95 654,97" fill="#3B82F6"/>
  <text x="660" y="170" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">语用/情感</text>
  <!-- 形层到音层的箭头 -->
  <line x1="645" y1="270" x2="680" y2="270" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="678,266 686,270 678,274" fill="#64748B"/>
  <text x="663" y="262" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748B">内容核心</text>
  <!-- 底部：四条设计原则 -->
  <rect x="30" y="400" width="225" height="55" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="142" y="422" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">认知职责分离</text>
  <text x="142" y="440" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">四类操作逻辑互不相容</text>
  <rect x="270" y="400" width="225" height="55" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="382" y="422" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">验证独立于生成</text>
  <text x="382" y="440" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">必然性无法从概率中推出</text>
  <rect x="510" y="400" width="225" height="55" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="622" y="422" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">符形双向共生</text>
  <text x="622" y="440" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">注入约束形，归纳反哺符</text>
  <rect x="750" y="400" width="220" height="55" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="860" y="422" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#B45309">意识是融合的结果</text>
  <text x="860" y="440" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">意层是符·形·音融合后涌现的理解</text>
  <text x="500" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">SFEM四维认知架构：规则为骨架，现象为血肉，体验为色彩，意识为灵魂——四维各司其职，缺一不可</text>
</svg>
