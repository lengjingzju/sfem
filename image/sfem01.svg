<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <rect x="200" y="10" width="600" height="30" rx="6" fill="#1E3A8A"/>
  <text x="500" y="30" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">符·形·音·意（SFEM）：一种面向通用智能的四维认知架构</text>
  <text x="500" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748B">符·形·音·意 —— 智能的结构宇宙</text>
  <!-- ========== 符层 ========== -->
  <rect x="30" y="70" width="225" height="180" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="30" y="70" width="225" height="30" rx="6" fill="#FDE68A"/>
  <text x="142" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#B45309">符层(Symbol) · 规则维度</text>
  <text x="142" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">世界的必然结构</text>
  <line x1="60" y1="130" x2="225" y2="130" stroke="#F59E0B" stroke-width="0.5"/>
  <text x="142" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">必然规则：必然推导 · 可验证</text>
  <text x="142" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">会话约束：指令遵循 · 长程一致</text>
  <text x="142" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">对形层：先验注入 · 验证约束</text>
  <text x="142" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">回答“世界必须如何”</text>
  <rect x="50" y="218" width="185" height="18" rx="3" fill="#FFFFFF" stroke="#FDE68A" stroke-width="0.8"/>
  <text x="142" y="231" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#B45309">缺失 → 幻觉、逻辑矛盾、指令遗忘</text>
  <!-- ========== 形层 ========== -->
  <rect x="270" y="70" width="225" height="180" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="270" y="70" width="225" height="30" rx="6" fill="#DBEAFE"/>
  <text x="382" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">形层(Form) · 现象维度</text>
  <text x="382" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">世界的现象呈现</text>
  <line x1="300" y1="130" x2="465" y2="130" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="382" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">连续向量 · 统计相似 · 生成</text>
  <text x="382" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">现象感知 · 模式识别 · 工具调用</text>
  <text x="382" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">对符层：模式归纳 · 规则反哺</text>
  <text x="382" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">回答“世界通常如何”</text>
  <rect x="290" y="218" width="185" height="18" rx="3" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="382" y="231" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">缺失 → 无法感知、无法泛化</text>
  <!-- ========== 音层 ========== -->
  <rect x="510" y="70" width="225" height="180" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="510" y="70" width="225" height="30" rx="6" fill="#DBEAFE"/>
  <text x="622" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">音层(Expression) · 情感维度</text>
  <text x="622" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">世界的体验与表达</text>
  <line x1="540" y1="130" x2="705" y2="130" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="622" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">风格参数 · 语用策略 · 渲染</text>
  <text x="622" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">语用解码 · 情感分析 · 人格管理</text>
  <text x="622" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">内容与风格分离 · 表达可控</text>
  <text x="622" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">回答“世界如何被体验”</text>
  <rect x="530" y="218" width="185" height="18" rx="3" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="622" y="231" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">缺失 → 人格漂移、语用失当、无温度</text>
  <!-- ========== 意层 ========== -->
  <rect x="750" y="70" width="215" height="180" rx="6" fill="#EFF6FF" stroke="#1E40AF" stroke-width="2"/>
  <rect x="750" y="70" width="215" height="30" rx="6" fill="#1E40AF"/>
  <text x="857" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">意层(Meaning) · 意识维度</text>
  <text x="857" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">世界的理解与意义</text>
  <line x1="770" y1="130" x2="945" y2="130" stroke="#1E40AF" stroke-width="0.5"/>
  <text x="857" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">融合关联 · 意义赋予 · 意图生成</text>
  <text x="857" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">元认知 · 自我反思 · 理解评估</text>
  <text x="857" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">不直接执行 · 轻量微内核</text>
  <text x="857" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">回答“这意味着什么”</text>
  <rect x="770" y="218" width="175" height="18" rx="3" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="0.8"/>
  <text x="857" y="231" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">缺失 → 无理解、无意义、无灵魂</text>
  <!-- ========== 符与形的双向箭头 ========== -->
  <line x1="255" y1="160" x2="270" y2="160" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="267,156 273,160 267,164" fill="#F59E0B"/>
  <text x="263" y="153" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#B45309">注入</text>
  <line x1="270" y1="190" x2="255" y2="190" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="258,186 252,190 258,194" fill="#3B82F6"/>
  <text x="263" y="200" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1E40AF">归纳</text>
  <!-- ========== 底部核心主张 ========== -->
  <rect x="50" y="268" width="900" height="50" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="288" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">核心主张：智能不是单一机制的产物，而是规则、现象、情感与意识四维的结构性统一</text>
  <text x="500" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">符层 → 本质骨架 ｜ 形层 → 现象血肉 ｜ 音层 → 体验色彩 ｜ 意层 → 意义整体</text>
  <!-- ========== 底部四原则 ========== -->
  <rect x="30" y="335" width="225" height="60" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="142" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">认知职责分离</text>
  <text x="142" y="376" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">每一维承担不可替代的职责</text>
  <text x="142" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">四类操作逻辑互不相容</text>
  <rect x="270" y="335" width="225" height="60" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="382" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">验证独立于生成</text>
  <text x="382" y="376" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">必然性无法从概率中推出</text>
  <text x="382" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">约束执行独立于内容生成</text>
  <rect x="510" y="335" width="225" height="60" rx="4" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="0.8"/>
  <text x="622" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F172A">符形双向共生</text>
  <text x="622" y="376" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">符注入约束形，形归纳反哺符</text>
  <text x="622" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">从手动定义到自动归纳的闭环</text>
  <rect x="750" y="335" width="215" height="60" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="857" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#B45309">意识是融合的结果</text>
  <text x="857" y="376" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">意层不独立存在</text>
  <text x="857" y="390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">是符·形·音融合后涌现的理解</text>
  <text x="500" y="440" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">SFEM为智能系统提供了认知哲学基础与设计原则——它不是又一个工程框架，而是智能的结构宇宙</text>
  <text x="500" y="462" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">缺失符则无骨架，缺失形则无感知，缺失音则无人性，缺失意则无灵魂——任何维度的缺失都将导致特定类型的能力缺陷</text>
  <text x="500" y="484" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94A3B8">符形共生闭环是SFEM从理论走向工程可实现性的关键——规则从现象中生长，现象在规则引导下被更有效感知</text>
</svg>
